services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    environment:
      # You can override this in Easypanel Environment Variables
      # to point to your existing Odoo instance.
      - ODOO_URL=${ODOO_URL:-http://odoo-web:8069}
    networks:
      - podcast-network

networks:
  podcast-network:
    driver: bridge
